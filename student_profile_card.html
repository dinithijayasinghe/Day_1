<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
        }

        .card {
            background: white;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 40px rgba(102, 126, 234, 0.2);
            overflow: hidden;
            width: 100%;
            max-width: 350px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-15px);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35), 0 0 50px rgba(102, 126, 234, 0.3);
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            padding: 40px 20px;
            text-align: center;
        }

        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e0e0e0 0%, #f5f5f5 100%);
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 5px solid white;
            font-size: 50px;
            color: #999;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25), inset 0 -2px 5px rgba(0, 0, 0, 0.05);
        }

        .card-body {
            padding: 30px 25px;
            text-align: center;
        }

        .student-name {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .stream {
            font-size: 14px;
            color: #667eea;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .bio-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .bio {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .stat-item {
            flex: 1;
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <div class="profile-image">👩‍🎓</div>
        </div>
        <div class="card-body">
            <div class="student-name">Dinithi Jayasinghe</div>
            <div class="stream">Computer Science</div>
            
            <div class="bio-label">About</div>
            <div class="bio">I'm a undergraduate at UCSC with strong passion to explore ML and Data Science</div>
            
            
            
    </div>
</body>
</html>
